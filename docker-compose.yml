services:
  # ── PostgreSQL (Outline uniquement — auth utilise SQLite) ──
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: outline_user
      POSTGRES_PASSWORD: ${OUTLINE_DB_PASSWORD}
      POSTGRES_DB: outline
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "outline_user", "-d", "outline"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (cache Outline) ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Outline (wiki) ──
  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    ports:
      - "3000:3000"
    env_file: ./.env
    volumes:
      - outline-data:/var/lib/outline/data
    environment:
      DATABASE_URL: postgres://outline_user:${OUTLINE_DB_PASSWORD}@postgres:5432/outline
      # OIDC — split externe/interne :
      #   AUTH/LOGOUT  → URL publique (le navigateur y est redirigé)
      #   TOKEN/USERINFO → URL interne (Outline appelle auth direct dans le réseau docker)
      OIDC_AUTH_URI:     ${AUTH_PUBLIC_URL}/auth
      OIDC_LOGOUT_URI:   ${AUTH_PUBLIC_URL}/session/end
      OIDC_TOKEN_URI:    http://auth:4000/token
      OIDC_USERINFO_URI: http://auth:4000/me

  # ── auth (IdP maison : OIDC + UI admin pour gérer les users) ──
  auth:
    build: ./auth
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - auth-data:/app/data
    environment:
      PUBLIC_URL: ${AUTH_PUBLIC_URL}
      SESSION_SECRET: ${AUTH_SESSION_SECRET}

  # ── Postgres dédié kan (kan exige PG15, Outline tourne en PG17) ──
  kan-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kan_db
      POSTGRES_USER: kan
      POSTGRES_PASSWORD: ${KAN_DB_PASSWORD}
    volumes:
      - kan-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kan -d kan_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migration schéma kan (one-shot) ──
  kan-migrate:
    image: ghcr.io/kanbn/kan-migrate:latest
    restart: "no"
    depends_on:
      kan-postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgres://kan:${KAN_DB_PASSWORD}@kan-postgres:5432/kan_db

  # ── kan (alternative Trello, second client OIDC) ──
  kan:
    image: ghcr.io/kanbn/kan:latest
    restart: unless-stopped
    depends_on:
      kan-migrate:
        condition: service_completed_successfully
      auth:
        condition: service_started
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_BASE_URL: ${KAN_PUBLIC_URL}
      BETTER_AUTH_SECRET: ${KAN_BETTER_AUTH_SECRET}
      BETTER_AUTH_TRUSTED_ORIGINS: ${KAN_PUBLIC_URL}
      POSTGRES_URL: postgres://kan:${KAN_DB_PASSWORD}@kan-postgres:5432/kan_db
      # Désactive l'inscription par mot de passe local, force le SSO.
      NEXT_PUBLIC_DISABLE_SIGN_UP: "true"
      # OIDC vers Simple SSO.
      # DISCOVERY_URL doit pointer sur l'URL publique : kan y redirige le navigateur.
      OIDC_CLIENT_ID: ${KAN_OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${KAN_OIDC_CLIENT_SECRET}
      OIDC_DISCOVERY_URL: ${AUTH_PUBLIC_URL}/.well-known/openid-configuration

volumes:
  postgres-data:
  outline-data:
  auth-data:
  kan-postgres-data:
