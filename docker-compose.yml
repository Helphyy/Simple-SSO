services:
  # ── PostgreSQL (Outline uniquement — auth utilise SQLite) ──
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: outline_user
      POSTGRES_PASSWORD: ${OUTLINE_DB_PASSWORD}
      POSTGRES_DB: outline
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "outline_user", "-d", "outline"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (cache Outline) ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Outline (wiki) ──
  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    ports:
      - "3000:3000"
    env_file: ./.env
    volumes:
      - outline-data:/var/lib/outline/data
    environment:
      DATABASE_URL: postgres://outline_user:${OUTLINE_DB_PASSWORD}@postgres:5432/outline
      # OIDC — split externe/interne :
      #   AUTH/LOGOUT  → URL publique (le navigateur y est redirigé)
      #   TOKEN/USERINFO → URL interne (Outline appelle auth direct dans le réseau docker)
      OIDC_AUTH_URI:     ${AUTH_PUBLIC_URL}/auth
      OIDC_LOGOUT_URI:   ${AUTH_PUBLIC_URL}/session/end
      OIDC_TOKEN_URI:    http://auth:4000/token
      OIDC_USERINFO_URI: http://auth:4000/me

  # ── auth (IdP maison : OIDC + UI admin pour gérer les users) ──
  auth:
    build: ./auth
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - auth-data:/app/data
    environment:
      PUBLIC_URL: ${AUTH_PUBLIC_URL}
      SESSION_SECRET: ${AUTH_SESSION_SECRET}

  # ── Postgres dédié Planka ──
  planka-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: planka
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - planka-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d planka"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Planka (kanban, second client OIDC) ──
  # En dev, AUTH_PUBLIC_URL=http://localhost:4000 (pour le navigateur).
  # Le sidecar `planka-sso-proxy` ouvre 127.0.0.1:4000 dans le NETWORK
  # NAMESPACE de Planka et forward vers `auth:4000` : le serveur Planka
  # peut donc faire ses calls token/userinfo sur localhost:4000 comme le
  # navigateur, sans split d'URL. En prod (DNS public), c'est inutile.
  planka:
    image: ghcr.io/plankanban/planka:latest
    restart: unless-stopped
    depends_on:
      planka-postgres:
        condition: service_healthy
      auth:
        condition: service_started
    ports:
      - "3002:1337"
    volumes:
      - planka-data:/app/data
    environment:
      BASE_URL: ${PLANKA_PUBLIC_URL}
      DATABASE_URL: postgresql://postgres@planka-postgres/planka
      SECRET_KEY: ${PLANKA_SECRET_KEY}
      TRUST_PROXY: "true"
      OIDC_ISSUER: ${AUTH_PUBLIC_URL}
      OIDC_CLIENT_ID: ${PLANKA_OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${PLANKA_OIDC_CLIENT_SECRET}
      OIDC_SCOPES: openid email profile
      OIDC_EMAIL_ATTRIBUTE: email
      OIDC_NAME_ATTRIBUTE: name
      OIDC_USERNAME_ATTRIBUTE: preferred_username
      OIDC_IGNORE_ROLES: "true"

  # Sidecar : bind 127.0.0.1:4000 → auth:4000 dans le netns de Planka.
  # Permet à Planka d'utiliser la même OIDC_ISSUER que le navigateur en dev.
  planka-sso-proxy:
    image: alpine/socat:latest
    restart: unless-stopped
    network_mode: "service:planka"
    depends_on:
      planka:
        condition: service_started
      auth:
        condition: service_started
    # TCP6-LISTEN bind ::1 = dual-stack loopback : Node préfère ::1, et le
    # socket IPv6 sur Linux accepte aussi les connexions IPv4 mappées.
    command: ["TCP6-LISTEN:4000,fork,reuseaddr,bind=[::1]", "TCP:auth:4000"]

volumes:
  postgres-data:
  outline-data:
  auth-data:
  planka-postgres-data:
  planka-data:
