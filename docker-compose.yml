services:
  # ── PostgreSQL (Outline uniquement — auth utilise SQLite) ──
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: outline_user
      POSTGRES_PASSWORD: ${OUTLINE_DB_PASSWORD}
      POSTGRES_DB: outline
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "outline_user", "-d", "outline"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (cache Outline) ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Outline (wiki) ──
  # Patch dev local : Outline v1.8+ force `secure: env.isProduction` sur ses
  # cookies OAuth (passport state + CSRF), ce qui crash en HTTP. On override
  # l'entrypoint pour neutraliser ce flag avant de booter. En prod (HTTPS),
  # le sed ne change rien fonctionnellement puisque `secure: true` aurait
  # été le bon comportement de toute façon — mais on garde le patch pour la
  # simplicité d'un seul compose. Le navigateur accepte les cookies non-Secure
  # sur HTTPS sans problème.
  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    ports:
      - "3000:3000"
    env_file: ./.env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        grep -rl 'secure: _env\.default\.isProduction' /opt/outline/build \
          | xargs -r sed -i 's/secure: _env\.default\.isProduction/secure: false/g'
        exec docker-entrypoint.sh node build/server/index.js
    volumes:
      - outline-data:/var/lib/outline/data
    environment:
      DATABASE_URL: postgres://outline_user:${OUTLINE_DB_PASSWORD}@postgres:5432/outline
      # OIDC — split externe/interne :
      #   AUTH/LOGOUT  → URL publique (le navigateur y est redirigé)
      #   TOKEN/USERINFO → URL interne (Outline appelle auth direct dans le réseau docker)
      OIDC_AUTH_URI:     ${AUTH_PUBLIC_URL}/auth
      OIDC_LOGOUT_URI:   ${AUTH_PUBLIC_URL}/session/end
      OIDC_TOKEN_URI:    http://auth:4000/token
      OIDC_USERINFO_URI: http://auth:4000/me

  # ── auth (IdP maison : OIDC + UI admin pour gérer les users) ──
  auth:
    build: ./auth
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - auth-data:/app/data
    environment:
      PUBLIC_URL: ${AUTH_PUBLIC_URL}
      SESSION_SECRET: ${AUTH_SESSION_SECRET}

  # ── Vikunja (kanban + gantt, second client OIDC) ──
  # List / Kanban / Gantt / Table sur les mêmes tâches. SQLite, pas de
  # Postgres dédié. Login local désactivé : SSO uniquement.
  # network_mode: host : Vikunja fetch la discovery OIDC côté serveur, et
  # l'issuer est http://localhost:4000. En réseau host, le localhost du
  # container est celui de la machine, donc l'issuer résout pareil pour le
  # serveur Vikunja et pour le navigateur. Zéro proxy, zéro split d'URL.
  # Vikunja n'a besoin de joindre aucun autre container (SQLite local),
  # il écoute directement sur le port 3002 de la machine.
  vikunja:
    image: vikunja/vikunja:latest
    restart: unless-stopped
    # L'image tourne en uid 1000 mais les volumes nommés sont créés root :
    # on lance en root (binaire Go unique, pas d'escalade possible ailleurs).
    user: "0:0"
    network_mode: host
    depends_on:
      auth:
        condition: service_started
    volumes:
      - vikunja-files:/app/vikunja/files
      - vikunja-db:/db
      # Déploiement TLS self-signed (voir README) : monter la CA locale
      # pour que Vikunja accepte la discovery OIDC en https.
      # - /etc/nginx/certs/ca.crt:/certs/ca.crt:ro
    environment:
      # Déploiement TLS self-signed : Go ne fera confiance qu'à cette CA,
      # suffisant ici (Vikunja ne sort nulle part ailleurs en TLS).
      # SSL_CERT_FILE: /certs/ca.crt
      VIKUNJA_SERVICE_INTERFACE: ":3002"
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_PUBLIC_URL}
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_JWT_SECRET}
      VIKUNJA_DATABASE_TYPE: sqlite
      VIKUNJA_DATABASE_PATH: /db/vikunja.db
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "false"
      VIKUNJA_AUTH_LOCAL_ENABLED: "false"
      VIKUNJA_AUTH_OPENID_ENABLED: "true"
      VIKUNJA_AUTH_OPENID_PROVIDERS_SIMPLESSO_NAME: Simple SSO
      VIKUNJA_AUTH_OPENID_PROVIDERS_SIMPLESSO_AUTHURL: ${AUTH_PUBLIC_URL}
      VIKUNJA_AUTH_OPENID_PROVIDERS_SIMPLESSO_CLIENTID: ${VIKUNJA_OIDC_CLIENT_ID}
      VIKUNJA_AUTH_OPENID_PROVIDERS_SIMPLESSO_CLIENTSECRET: ${VIKUNJA_OIDC_CLIENT_SECRET}
      VIKUNJA_AUTH_OPENID_PROVIDERS_SIMPLESSO_SCOPE: openid profile email

volumes:
  postgres-data:
  outline-data:
  auth-data:
  vikunja-files:
  vikunja-db:
